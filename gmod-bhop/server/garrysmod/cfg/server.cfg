hostname "Crucible Bhop"
sv_password "[MooseMan98]"

// Slots / identity
sv_visiblemaxplayers 8
maxplayers 8
sv_lan 0

// Core bhop movement
air_density 2
sv_airaccelerate 150
sv_enablebunnyhopping 1
sv_autobunnyhopping 1
sv_maxvelocity 10000
sv_gravity 800
sv_staminamax 0
sv_staminalandcost 0
sv_staminajumpcost 0

// General server behavior
sv_alltalk 1
sv_downloadurl ""
sv_allowdownload 1
sv_allowupload 1
sv_hibernate_when_empty 0

// RCON and logging (change rcon password)
rcon_password "CHANGE_ME"
log on

// Load additional tuning
exec autoexec.cfg
